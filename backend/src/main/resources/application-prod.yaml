# =============================================================================
# Profile PROD — Render / Docker (SPRING_PROFILES_ACTIVE=prod)
#
# Health check Render: /api/v1/actuator/health  (KHÔNG dùng /actuator/health)
# Biến bắt buộc trên Render: JWT_SECRET, AIVEN_DB_PASSWORD
# Tùy chọn: GEMINI_API_KEY, WEATHERAPI_KEY, MINIO_*, VNPAY_*, AIVEN_CA_CERT_PATH
# =============================================================================

server:
  port: ${PORT:8088}

spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    repair-on-migrate: false
  jackson:
    time-zone: Asia/Ho_Chi_Minh

logging:
  level:
    root: INFO
    com.wedservice.backend: INFO
    org.hibernate.SQL: WARN

app:
  datasource:
    failover:
      enabled: true
      prefer-remote: true
      probe-timeout-ms: 30000
      remote:
        enabled: true
        host: mysql-lab-mtung3365-864a.f.aivencloud.com
        port: 23132
        database: defaultdb
        username: avnadmin
        password: ${AIVEN_DB_PASSWORD}
        ssl-mode: REQUIRED
        # Docker/local: ca.pem ở thư mục backend (copy vào /app/ca.pem trong image)
        ca-cert-path: ${AIVEN_CA_CERT_PATH:ca.pem}
      local:
        enabled: false
  security:
    whitelist:
      - "/auth/register"
      - "/auth/login"
      - "/auth/refresh"
      - "/ai/chat"
      - "/actuator/health/**"
      - "/actuator/info"
      - "/payments/vnpay/ipn"
    jwt:
      secret: ${JWT_SECRET}
      expiration: 3600000
      refresh-expiration: 2592000000

minio:
  url: ${MINIO_URL:http://127.0.0.1:9000}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  bucketName: ${MINIO_BUCKET_NAME:tour-images}
