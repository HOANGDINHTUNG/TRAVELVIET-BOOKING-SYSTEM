# =============================================================================
# Profile PROD — Render / Docker (SPRING_PROFILES_ACTIVE=prod)
#
# Health check Render: /api/v1/live (khuyến nghị). /actuator/health prod chỉ ping (tránh timeout DB)
# Bắt buộc: JWT_SECRET, AIVEN_DB_PASSWORD, MYSQL_SERVICE_URI (hoặc AIVEN_DB_HOST+PORT)
# Render free 512MB — Health: /api/v1/live (endpoint phải eager, không lazy bean)
# =============================================================================

server:
  address: 0.0.0.0
  port: ${PORT}

spring:
  main:
    # false: /live và /actuator/health phải có ngay khi Tomcat listen (Render probe HTTP)
    lazy-initialization: false
  jmx:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.metrics.export.prometheus.PrometheusMetricsExportAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - io.github.resilience4j.springboot3.autoconfigure.Resilience4jAutoConfiguration
  data:
    redis:
      # Tránh placeholder thiếu từ application.yaml khi Redis autoconfig tắt
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      repositories:
        enabled: false
    jpa:
      repositories:
        bootstrap-mode: lazy
  datasource:
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        query:
          startup_check: false
        boot:
          # false cần dialect tường minh ở trên — tránh query metadata lúc boot
          allow_jdbc_metadata_access: false
  # Flyway: bật bằng FLYWAY_ENABLED=true + xóa FlywayAutoConfiguration khỏi exclude ở trên
  flyway:
    enabled: ${FLYWAY_ENABLED}
  jackson:
    time-zone: Asia/Ho_Chi_Minh

logging:
  level:
    root: INFO
    com.wedservice.backend: INFO
    org.hibernate.SQL: WARN
    org.springframework.boot: INFO

app:
  cache:
    mode: caffeine
  async:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 100
  datasource:
    failover:
      enabled: true
      prefer-remote: true
      probe-timeout-ms: 8000
      skip-startup-probe: true
      remote:
        enabled: true
        service-uri: ${MYSQL_SERVICE_URI}
        host: ${AIVEN_DB_HOST}
        port: ${AIVEN_DB_PORT}
        database: ${AIVEN_DB_DATABASE}
        username: ${AIVEN_DB_USER}
        password: ${AIVEN_DB_PASSWORD}
        ssl-mode: ${AIVEN_DB_SSL_MODE}
        ca-cert-path: ${AIVEN_CA_CERT_PATH}
      local:
        enabled: false
  security:
    whitelist:
      - "/live"
      - "/auth/register"
      - "/auth/login"
      - "/auth/refresh"
      - "/ai/chat"
      - "/actuator/health"
      - "/actuator/health/**"
      - "/actuator/info"
      - "/payments/vnpay/ipn"
    jwt:
      secret: ${JWT_SECRET}
      expiration: 3600000
      refresh-expiration: 2592000000
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE}
    hash-secret: ${VNPAY_HASH_SECRET}
    return-url: ${VNPAY_RETURN_URL}
    ipn-url: ${VNPAY_IPN_URL}

minio:
  enabled: ${MINIO_ENABLED}
  url: ${MINIO_URL}
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}
  bucketName: ${MINIO_BUCKET_NAME}

gemini:
  api-key: ${GEMINI_API_KEY}

weatherapi:
  api-key: ${WEATHERAPI_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health, info
      base-path: /actuator
  endpoint:
    health:
      enabled: false
      show-details: never
      show-components: never
      probes:
        enabled: false
      group:
        # Render mặc định hay probe /actuator/health — không gồm DB (tránh Timed out)
        default:
          include: ping
        liveness:
          include: ping
        readiness:
          include: readinessState
  health:
    db:
      enabled: false
