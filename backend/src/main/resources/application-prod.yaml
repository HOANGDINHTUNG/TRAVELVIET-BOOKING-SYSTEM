# =============================================================================
# Profile PROD — Render / Docker (SPRING_PROFILES_ACTIVE=prod)
#
# Health check Render: /api/v1/actuator/health  (KHÔNG dùng /actuator/health)
# Biến bắt buộc trên Render:
#   JWT_SECRET, AIVEN_DB_PASSWORD
#   MYSQL_SERVICE_URI (khuyến nghị) HOẶC AIVEN_DB_HOST + AIVEN_DB_PORT từ Aiven Public
# Không có host mặc định — hostname cũ trong repo không còn trên DNS.
# Tùy chọn: GEMINI_API_KEY, WEATHERAPI_KEY, MINIO_*, VNPAY_*, AIVEN_CA_CERT_PATH
# =============================================================================

server:
  port: ${PORT}

spring:
  # Prod trên Render: không cần Redis local — tránh scan repo + kết nối localhost:6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    repair-on-migrate: false
  jackson:
    time-zone: Asia/Ho_Chi_Minh

logging:
  level:
    root: INFO
    com.wedservice.backend: INFO
    org.hibernate.SQL: WARN

app:
  cache:
    mode: caffeine
  datasource:
    failover:
      enabled: true
      prefer-remote: true
      probe-timeout-ms: 8000
      remote:
        enabled: true
        # Render: dán Service URI (Public) từ Aiven — ưu tiên hơn host/port rời
        service-uri: ${MYSQL_SERVICE_URI}
        host: ${AIVEN_DB_HOST}
        port: ${AIVEN_DB_PORT}
        database: ${AIVEN_DB_DATABASE}
        username: ${AIVEN_DB_USER}
        password: ${AIVEN_DB_PASSWORD}
        ssl-mode: ${AIVEN_DB_SSL_MODE}
        ca-cert-path: ${AIVEN_CA_CERT_PATH}
      local:
        enabled: false
  security:
    whitelist:
      - "/auth/register"
      - "/auth/login"
      - "/auth/refresh"
      - "/ai/chat"
      - "/actuator/health/**"
      - "/actuator/info"
      - "/payments/vnpay/ipn"
    jwt:
      secret: ${JWT_SECRET}
      expiration: 3600000
      refresh-expiration: 2592000000

minio:
  url: ${MINIO_URL}
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}
  bucketName: ${MINIO_BUCKET_NAME}
