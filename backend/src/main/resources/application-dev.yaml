spring:
  debug: true
  datasource:
    url: jdbc:mysql://localhost:3308/wedservice?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:wed_app_user}
    password: ${DB_PASSWORD:123456}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    time-zone: Asia/Ho_Chi_Minh

logging:
  file:
    name: logs/backend.log
  level:
    root: INFO
    com.wedservice.backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG

app:
  security:
    whitelist:
      - "/auth/register"
      - "/auth/login"
      - "/auth/refresh"
      - "/system/health"
    jwt:
      secret: ${JWT_SECRET:wedservice-local-dev-secret-key-change-before-production}
      expiration: ${JWT_EXPIRATION:3600000} # 1 hour (default)
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000} # 30 days (default)
