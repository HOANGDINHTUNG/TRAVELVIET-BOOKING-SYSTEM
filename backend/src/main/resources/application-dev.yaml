# =============================================================================
# Profile DEV — cấu hình đọc trực tiếp tại đây (không cần DB_HOST, DB_PORT trong .env).
#
# Thứ tự database khi failover bật:
#   1) Aiven (cloud)  — cần AIVEN_DB_PASSWORD trong backend/.env
#   2) MySQL local    — 127.0.0.1:3307 / wedservice
#
# API cho frontend: http://localhost:8088/api/v1  (không liên quan cổng 3307)
#
# Failover API (public Render → local):
#   app.api.failover.enabled=true — probe Render lúc start; nếu down → khuyến nghị localhost
#   GET /system/health → connectivity.api.recommendedBaseUrl
# =============================================================================

spring:
  debug: true
  # Dev dùng cache Caffeine + rate-limit memory — không cần Redis chạy local.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    # Chỉ dùng khi tắt app.datasource.failover.enabled
    url: jdbc:mysql://127.0.0.1:3307/wedservice?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: wed_app_user
    password: "123456"
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    repair-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        type:
          preferred_uuid_jdbc_type: CHAR
  jackson:
    time-zone: Asia/Ho_Chi_Minh

logging:
  file:
    name: logs/backend.log
  level:
    root: INFO
    com.wedservice.backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG

app:
  api:
    failover:
      enabled: ${API_FAILOVER_ENABLED:true}
      prefer-public: ${API_PREFER_PUBLIC:true}
      probe-timeout-ms: ${API_PROBE_TIMEOUT_MS:8000}
      public-base-url: ${APP_API_PUBLIC_BASE_URL:https://travelviet-booking-system.onrender.com/api/v1}
      local-base-url: ${APP_API_LOCAL_BASE_URL:http://localhost:8088/api/v1}
  datasource:
    failover:
      enabled: ${DB_FAILOVER_ENABLED:true}
      prefer-remote: ${DB_PREFER_REMOTE:true}
      probe-timeout-ms: 8000
      remote:
        enabled: true
        host: mysql-lab-mtung3365-864a.f.aivencloud.com
        port: 23132
        database: defaultdb
        username: avnadmin
        password: ${AIVEN_DB_PASSWORD:}
        ssl-mode: REQUIRED
        ca-cert-path: classpath:ssl/ca.pem
      local:
        enabled: true
        host: 127.0.0.1
        port: 3307
        database: wedservice
        username: wed_app_user
        password: "123456"
        use-ssl: false
  security:
    whitelist:
      - "/auth/register"
      - "/auth/login"
      - "/auth/refresh"
      - "/ai/chat"
      - "/actuator/health/**"
      - "/actuator/info"
      - "/system/health"
      - "/payments/vnpay/ipn"
    jwt:
      secret: local-dev-jwt-secret-change-via-env-min-32-chars-ok
      expiration: 3600000
      refresh-expiration: 2592000000
