spring:
  debug: true
  datasource:
    # 127.0.0.1 + DB_HOST/DB_PORT: tránh IPv6 localhost; đồng bộ với script ensure-mysql-dev-user.ps1
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3307}/wedservice?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:wed_app_user}
    password: ${DB_PASSWORD:123456}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    repair-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    time-zone: Asia/Ho_Chi_Minh

logging:
  file:
    name: logs/backend.log
  level:
    root: INFO
    com.wedservice.backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG

app:
  security:
    whitelist:
      - "/auth/register"
      - "/auth/login"
      - "/auth/refresh"
      - "/ai/chat"
      - "/actuator/health/**"
      - "/actuator/info"
      - "/system/health"
      - "/payments/vnpay/ipn"
    jwt:
      # Chỉ dùng khi chạy profile dev; production phải set JWT_SECRET (đủ dài, không commit).
      secret: ${JWT_SECRET:local-dev-jwt-secret-change-via-env-min-32-chars-ok}
      expiration: ${JWT_EXPIRATION:3600000} # 1 hour (default)
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000} # 30 days (default)
