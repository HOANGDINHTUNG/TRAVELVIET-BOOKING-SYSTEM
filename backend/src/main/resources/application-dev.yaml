# =============================================================================
# Profile DEV — cấu hình đọc trực tiếp tại đây (không cần DB_HOST, DB_PORT trong .env).
#
# Thứ tự database khi failover bật:
#   1) Aiven (cloud)  — cần AIVEN_DB_PASSWORD trong backend/.env
#   2) MySQL local    — 127.0.0.1:3307 / wedservice
#
# API cho frontend: http://localhost:8088/api/v1  (không liên quan cổng 3307)
#
# Failover API (local trước → Render public nếu local down):
#   app.api.failover.enabled=true — probe lúc start; GET /system/health → connectivity.api.recommendedBaseUrl
# =============================================================================

spring:
  debug: true
  # Dev dùng cache Caffeine + rate-limit memory — không cần Redis chạy local.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.health.DataRedisReactiveHealthContributorAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.health.DataRedisHealthContributorAutoConfiguration
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  datasource:
    # Chỉ dùng khi tắt app.datasource.failover.enabled
    url: jdbc:mysql://127.0.0.1:3307/wedservice?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: wed_app_user
    password: 123456
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    repair-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        type:
          preferred_uuid_jdbc_type: CHAR
  jackson:
    time-zone: Asia/Ho_Chi_Minh

logging:
  file:
    name: logs/backend.log
  level:
    root: INFO
    com.wedservice.backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG

app:
  api:
    failover:
      enabled: ${API_FAILOVER_ENABLED}
      prefer-public: ${API_PREFER_PUBLIC}
      probe-timeout-ms: 8000
      # Hai URL: public (Render) | local (máy dev) — giữ default vì là 2 trường hợp failover
      public-base-url: ${APP_API_PUBLIC_BASE_URL}
      local-base-url: ${APP_API_LOCAL_BASE_URL}
  datasource:
    failover:
      enabled: ${DB_FAILOVER_ENABLED}
      prefer-remote: ${DB_PREFER_REMOTE}
      probe-timeout-ms: 8000
      remote:
        enabled: true
        host: ${AIVEN_DB_HOST}
        port: ${AIVEN_DB_PORT}
        database: ${AIVEN_DB_DATABASE}
        username: ${AIVEN_DB_USER}
        password: ${AIVEN_DB_PASSWORD}
        ssl-mode: ${AIVEN_DB_SSL_MODE}
        ca-cert-path: ${AIVEN_CA_CERT_PATH}
      local:
        enabled: true
        host: 127.0.0.1
        port: 3306
        database: wedservice
        username: wed_app_user
        password: 123456
        use-ssl: false
  security:
    whitelist:
      - "/auth/register"
      - "/auth/login"
      - "/auth/refresh"
      - "/ai/chat"
      - "/actuator/health/**"
      - "/actuator/info"
      - "/system/health"
      - "/payments/vnpay/ipn"
    jwt:
      secret: ${JWT_SECRET}
      expiration: 3600000
      refresh-expiration: 2592000000
