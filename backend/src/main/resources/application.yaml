app:
  security:
    whitelist:
      - "/auth/register"
      - "/auth/login"
      - "/auth/refresh"
      - "/actuator/health/**"
      - "/actuator/info"
    jwt:
      secret: ${JWT_SECRET:wedservice-default-secret-change-me}
      expiration: ${JWT_EXPIRATION:3600000} # 1 hour
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000} # 30 days

minio:
  url: ${MINIO_URL:http://192.168.100.142:9000}
  accessKey: ${MINIO_ACCESS_KEY:admin}
  secretKey: ${MINIO_SECRET_KEY:09022006}
  bucketName: ${MINIO_BUCKET_NAME:tour-images}

weatherapi:
  base-url: ${WEATHERAPI_BASE_URL:https://api.weatherapi.com/v1}
  api-key: ${WEATHERAPI_KEY:}
  forecast-days: ${WEATHERAPI_FORECAST_DAYS:1}
  aqi: ${WEATHERAPI_AQI:no}
  alerts: ${WEATHERAPI_ALERTS:no}

spring:
  application:
    name: wedservice-backend
  profiles:
    default: dev
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{traceId:-NO-TRACE}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{traceId:-NO-TRACE}] - %msg%n"

server:
  port: 8088
  servlet:
    context-path: /api/v1
