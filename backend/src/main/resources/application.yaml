# =============================================================================
# Cấu hình chung (mọi profile). Dev: xem application-dev.yaml (đọc trực tiếp, ít .env).
# Chỉ cần .env cho secret: AIVEN_DB_PASSWORD, GEMINI_API_KEY, JWT_SECRET (prod), ...
# =============================================================================

app:
  cache:
    caffeine:
      tours:
        maximum-size: 2000
        expire-after-write-seconds: 300
      destinations:
        maximum-size: 1000
        expire-after-write-seconds: 300
      destination-details:
        maximum-size: 4000
        expire-after-write-seconds: 600
  security:
    whitelist:
      - "/auth/register"
      - "/auth/login"
      - "/auth/refresh"
      - "/ai/chat"
      - "/actuator/health/**"
      - "/actuator/info"
      - "/payments/vnpay/ipn"
    jwt:
      secret: ${JWT_SECRET:}
      expiration: 3600000
      refresh-expiration: 2592000000
  vnpay:
    enabled: false
    pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    locale: vn
    order-info-prefix: TravelViet booking
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    return-url: ${VNPAY_RETURN_URL:}
    ipn-url: ${VNPAY_IPN_URL:}

minio:
  url: http://127.0.0.1:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: tour-images

weatherapi:
  base-url: https://api.weatherapi.com/v1
  api-key: ${WEATHERAPI_KEY:}
  forecast-days: 1
  aqi: no
  alerts: no

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
  base-url: https://generativelanguage.googleapis.com/v1beta/models
  timeout: 15s

spring:
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  application:
    name: wedservice-backend
  profiles:
    default: dev
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{traceId:-NO-TRACE}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{traceId:-NO-TRACE}] - %msg%n"

server:
  port: 8088
  servlet:
    context-path: /api/v1
