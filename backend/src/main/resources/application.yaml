# =============================================================================
# Cấu hình chung (mọi profile). Dev: xem application-dev.yaml (đọc trực tiếp, ít .env).
# Chỉ cần .env cho secret: AIVEN_DB_PASSWORD, GEMINI_API_KEY, JWT_SECRET (prod), ...
# =============================================================================

app:
  api:
    failover:
      enabled: false
      prefer-public: false
      probe-timeout-ms: 8000
      # Hai URL: public | local — giữ default cho 2 trường hợp
      public-base-url: ${APP_API_PUBLIC_BASE_URL}
      local-base-url: ${APP_API_LOCAL_BASE_URL}
      health-path: /system/health
  cache:
    # mode: caffeine | redis | hybrid (use profile k8s for hybrid + Redis)
    mode: caffeine
    caffeine:
      tours:
        maximum-size: 2000
        expire-after-write-seconds: 300
      destinations:
        maximum-size: 1000
        expire-after-write-seconds: 300
      destination-details:
        maximum-size: 4000
        expire-after-write-seconds: 600
      tour-details:
        maximum-size: 4000
        expire-after-write-seconds: 600
  async:
    core-pool-size: 4
    max-pool-size: 16
    queue-capacity: 500
    thread-name-prefix: app-async-
  security:
    rate-limit:
      store: memory
      capacity: 10
      refill-period: 1m
      redis-key-prefix: "rate-limit:auth:"
    whitelist:
      - "/auth/register"
      - "/auth/login"
      - "/auth/refresh"
      - "/ai/chat"
      - "/actuator/health/**"
      - "/actuator/info"
      - "/payments/vnpay/ipn"
    jwt:
      secret: ${JWT_SECRET}
      expiration: 3600000
      refresh-expiration: 2592000000
  vnpay:
    enabled: false
    pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    locale: vn
    order-info-prefix: TravelViet booking
    tmn-code: ${VNPAY_TMN_CODE}
    hash-secret: ${VNPAY_HASH_SECRET}
    return-url: ${VNPAY_RETURN_URL}
    ipn-url: ${VNPAY_IPN_URL}

minio:
  url: http://127.0.0.1:9000
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}
  bucketName: tour-images

weatherapi:
  base-url: https://api.weatherapi.com/v1
  api-key: ${WEATHERAPI_KEY}
  forecast-days: 1
  aqi: no
  alerts: no

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash
  base-url: https://generativelanguage.googleapis.com/v1beta/models
  timeout: 15s

spring:
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 1800000
      idle-timeout: 600000
      leak-detection-threshold: 0
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  application:
    name: wedservice-backend
  profiles:
    default: dev
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/v1_tables
      - classpath:db/migration/v2_indexes
      - classpath:db/migration/v3_views
      - classpath:db/migration/v4_procedures
      - classpath:db/migration/v5_functions
      - classpath:db/migration/v6_triggers
      - classpath:db/migration/v7_seed_data
      - classpath:db/migration/v8_seed_i18n
    baseline-on-migrate: true
  jpa:
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR

resilience4j:
  circuitbreaker:
    instances:
      apiReachabilityProbe:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  timelimiter:
    instances:
      apiReachabilityProbe:
        timeout-duration: 3s
        cancel-running-future: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{traceId:-NO-TRACE}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{traceId:-NO-TRACE}] - %msg%n"

server:
  port: 8088
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024
