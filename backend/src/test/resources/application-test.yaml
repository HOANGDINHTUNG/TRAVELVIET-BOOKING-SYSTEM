spring:
  datasource:
    url: jdbc:h2:mem:wedservice_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

app:
  security:
    jwt:
      secret: test-secret-key-1234567890
      expiration: 86400000
