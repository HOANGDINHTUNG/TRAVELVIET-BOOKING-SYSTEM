# Blueprint Render — backend API (Docker)
services:
  - type: web
    name: travelviet-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/v1/actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: AIVEN_DB_PASSWORD
        sync: false
      - key: AIVEN_CA_CERT_PATH
        value: ca.pem
      - key: GEMINI_API_KEY
        sync: false
      - key: WEATHERAPI_KEY
        sync: false
