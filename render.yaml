# Blueprint Render — backend API (Docker)
# Service đang chạy: travelviet-booking-system — Dashboard → Settings → Health Check Path = /api/v1/live
services:
  - type: web
    name: travelviet-booking-system
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/v1/live
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      # BẮT BUỘC — chỉ AIVEN_DB_PASSWORD không đủ; cần URI hoặc HOST (xem backend/render.env.example)
      - key: MYSQL_SERVICE_URI
        sync: false
      - key: AIVEN_DB_HOST
        sync: false
      - key: AIVEN_DB_PORT
        sync: false
      - key: AIVEN_DB_PASSWORD
        sync: false
      - key: AIVEN_CA_CERT_PATH
        value: classpath:ssl/ca.pem
      - key: FLYWAY_ENABLED
        value: "false"
      - key: MINIO_ENABLED
        value: "false"
      - key: GEMINI_API_KEY
        sync: false
      - key: WEATHERAPI_KEY
        sync: false
